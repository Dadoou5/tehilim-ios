<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Tehilim — Lelouy Nichmat</title>

<!-- Aperçu enrichi (Mail / WhatsApp / iMessage) : icône de l'app + titre -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Tehilim">
<meta property="og:title" content="Tehilim — Lelouy Nichmat">
<meta property="og:description" content="Ouvre cette prière dans l'application Tehilim.">
<meta property="og:image" content="https://tehilimapp.com/icon.png">
<meta property="og:image:width" content="384">
<meta property="og:image:height" content="384">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Tehilim — Lelouy Nichmat">
<meta name="twitter:description" content="Ouvre cette prière dans l'application Tehilim.">
<meta name="twitter:image" content="https://tehilimapp.com/icon.png">
<link rel="icon" href="https://tehilimapp.com/icon.png">
<link rel="apple-touch-icon" href="https://tehilimapp.com/icon.png">

<style>
  :root {
    --bg: #f7f3ec; --surface: #ffffff; --text: #2b2620;
    --muted: #8a8276; --accent: #b8893b; --accent-d: #9a7330;
    --border: rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#15120d; --surface:#1f1b14; --text:#efe8da; --muted:#a89c87;
            --accent:#d6a85a; --accent-d:#c0954a; --border: rgba(255,255,255,.10); }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body { margin:0; height:100%; }
  body {
    background: linear-gradient(160deg, var(--bg), color-mix(in srgb, var(--bg) 85%, #000));
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding: 24px; min-height: 100%;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 22px; padding: 30px 26px; max-width: 420px; width: 100%;
    text-align: center; box-shadow: 0 18px 50px rgba(0,0,0,.12);
  }
  .appicon {
    width: 78px; height: 78px; border-radius: 18px;
    box-shadow: 0 8px 22px rgba(0,0,0,.20); display:block; margin: 0 auto 6px;
  }
  .kind {
    display:inline-block; margin-top: 12px; padding: 5px 14px; border-radius: 999px;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
    letter-spacing:.3px;
  }
  .subject {
    direction: rtl; font-size: 30px; font-weight: 700; margin: 16px 0 4px;
    line-height: 1.3;
  }
  .neshama { direction: rtl; color: var(--accent); font-size: 19px; margin-bottom: 14px; }
  .meta { color: var(--muted); font-size: 14px; margin: 0 0 4px; }
  .meta b { color: var(--text); font-weight: 600; }
  .lead { color: var(--muted); font-size: 15px; margin: 18px 0 22px; }
  .btn {
    display:block; width:100%; padding: 15px 18px; border-radius: 14px;
    font-size: 16px; font-weight: 600; text-decoration:none; border:none; cursor:pointer;
    margin-bottom: 12px;
  }
  .btn-primary { background: var(--accent); color:#fff; }
  .btn-primary:active { background: var(--accent-d); }
  .stores { margin-top: 18px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .store {
    color: var(--accent); text-decoration:none; font-size: 14px; font-weight: 600;
    padding: 9px 14px; border:1px solid var(--border); border-radius: 12px;
  }
  .foot { margin-top: 22px; color: var(--muted); font-size: 12px; }
  .hidden { display:none; }
</style>
</head>
<body>
  <main class="card">
    <img class="appicon" src="https://tehilimapp.com/icon.png" alt="Tehilim" width="78" height="78">
    <div class="kind" id="kind">Lelouy Nichmat</div>
    <div class="subject" id="subject">—</div>
    <div class="neshama" id="neshama">נשמה</div>

    <div class="meta" id="death"></div>

    <p class="lead" id="lead">Ouvre cette prière dans l'application Tehilim.</p>

    <a class="btn btn-primary" id="open" href="#">Ouvrir dans Tehilim</a>

    <div class="stores">
      <a class="store" id="appstore" href="#">App&nbsp;Store</a>
      <a class="store" id="playstore"
         href="https://play.google.com/store/apps/details?id=app.tehilim">Google&nbsp;Play</a>
    </div>

    <p class="foot" id="foot">Si rien ne se passe, installe Tehilim puis rouvre ce lien.</p>
  </main>

<script>
(function () {
  var APPLE_APP_ID = "6768043533";

  var T = {
    fr: {
      kindDefunt: "Lelouy Nichmat", kindMalade: "Refoua Cheléma",
      lead: "Ouvre cette prière dans l'application Tehilim.",
      open: "Ouvrir dans Tehilim",
      foot: "Si rien ne se passe, installe Tehilim puis rouvre ce lien.",
      invalid: "Lien de prière invalide ou incomplet.",
      death: "Date de décès : "
    },
    en: {
      kindDefunt: "Lelouy Nichmat", kindMalade: "Refoua Cheléma",
      lead: "Open this prayer in the Tehilim app.",
      open: "Open in Tehilim",
      foot: "If nothing happens, install Tehilim then reopen this link.",
      invalid: "Invalid or incomplete prayer link.",
      death: "Date of death: "
    }
  };
  var lang = (navigator.language || "fr").slice(0,2) === "en" ? "en" : "fr";
  var t = T[lang];
  document.documentElement.lang = lang;

  var q = new URLSearchParams(location.search);
  var type = (q.get("type") || "").toLowerCase();
  var name = (q.get("name") || "").trim();
  var rel = (q.get("rel") || "").toLowerCase();
  var mother = (q.get("mother") || "").trim();
  var death = (q.get("death") || "").trim(); // yyyy-MM-dd

  var deepLink = "tehilim://prayer" + location.search;
  document.getElementById("appstore").href =
    "https://apps.apple.com/app/tehilim/id" + APPLE_APP_ID;
  document.getElementById("lead").textContent = t.lead;
  document.getElementById("open").textContent = t.open;
  document.getElementById("foot").textContent = t.foot;

  if (!type || !name || !mother || (rel !== "ben" && rel !== "bat")) {
    document.getElementById("kind").classList.add("hidden");
    document.getElementById("subject").textContent = t.invalid;
    document.getElementById("neshama").classList.add("hidden");
    document.getElementById("open").classList.add("hidden");
    return;
  }

  document.getElementById("kind").textContent =
    (type === "malade") ? t.kindMalade : t.kindDefunt;
  if (type === "malade") document.getElementById("neshama").classList.add("hidden");

  var relHe = (rel === "bat") ? "בת" : "בן";
  document.getElementById("subject").textContent = name + " " + relHe + " " + mother;

  function fmtDate(iso) {
    var p = iso.split("-");
    if (p.length !== 3) return iso;
    var d = new Date(Date.UTC(+p[0], +p[1]-1, +p[2], 12));
    return d.toLocaleDateString(lang === "en" ? "en-US" : "fr-FR",
      { year: "numeric", month: "long", day: "numeric" });
  }
  if (death) {
    document.getElementById("death").innerHTML = t.death + "<b>" + fmtDate(death) + "</b>";
    // La prochaine azcara exacte est recalculée dans l'app (calendrier hébraïque).
  }

  var openBtn = document.getElementById("open");
  openBtn.href = deepLink;
  openBtn.addEventListener("click", function (e) {
    e.preventDefault();
    window.location.href = deepLink;
  });
  setTimeout(function () { window.location.href = deepLink; }, 350);
})();
</script>
</body>
</html>
