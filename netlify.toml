# Configuration Netlify pour la politique de confidentialité Tehilim
# Site statique — pas de build, juste publication du dossier docs/.

[build]
  publish = "docs"
  # Pas de commande de build — page HTML statique pure.
  command = ""

# Pretty URL : / → docs/index.html (par défaut)
# Si on ajoute d'autres pages plus tard, on peut ajouter des redirects ici.

[[headers]]
  for = "/*"
  [headers.values]
    # Sécurité de base — page sans JS externe ni iframes.
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=()"
    # CSP : page autonome, seuls les liens sortants sont autorisés (mailto, https).
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; form-action 'none'; base-uri 'self'; frame-ancestors 'none'"
    # Cache long pour les ressources statiques (l'HTML lui-même est revalidé).
    Cache-Control = "public, max-age=0, must-revalidate"
