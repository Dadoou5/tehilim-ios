name: Tehilim
options:
  bundleIdPrefix: com.tehilim
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_LANGUAGE: fr
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Tehilim:
    type: application
    platform: iOS
    sources:
      - path: ios/Tehilim
        excludes:
          - "Resources/Info.plist"
      - path: data
        buildPhase: resources
        type: group
    dependencies:
      - target: TehilimWidget
        embed: true
    settings:
      base:
        INFOPLIST_FILE: ios/Tehilim/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ios/Tehilim/Tehilim.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.david.tehilim
        PRODUCT_NAME: Tehilim
        CURRENT_PROJECT_VERSION: "32"
        MARKETING_VERSION: "1.12.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: NFQ2Q87CV9

  TehilimWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ios/TehilimWidget
        excludes:
          - "Info.plist"
      # Sources partagées avec l'app — modèles + petits services.
      - path: ios/Tehilim/Core/Models/Psalm.swift
      - path: ios/Tehilim/Core/Models/DailyRules.swift
      - path: ios/Tehilim/Core/Services/PsalmRepository.swift
      - path: ios/Tehilim/Core/Services/DailyEngine.swift
      - path: ios/Tehilim/Core/Services/AppGroup.swift
      - path: ios/Tehilim/Core/Services/HebrewDateFormatter.swift
      # V2.1.b — partage du swizzle Bundle pour i18n du widget.
      - path: ios/Tehilim/Core/Services/LocalizedBundle.swift
      # Mode Chabbat — calcul partagé (coucher du soleil + fenêtre Chabbat).
      - path: ios/Tehilim/Core/Services/ShabbatCalculator.swift
      # JSONs embarqués dans le widget pour fonctionnement autonome.
      - path: data
        buildPhase: resources
        type: group
    settings:
      base:
        INFOPLIST_FILE: ios/TehilimWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ios/TehilimWidget/TehilimWidget.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.david.tehilim.widget
        PRODUCT_NAME: TehilimWidget
        CURRENT_PROJECT_VERSION: "32"
        MARKETING_VERSION: "1.12.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: NFQ2Q87CV9
        SKIP_INSTALL: YES

  TehilimTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ios/TehilimTests
    dependencies:
      - target: Tehilim
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Tehilim.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Tehilim

schemes:
  Tehilim:
    build:
      targets:
        Tehilim: all
        TehilimWidget: all
        TehilimTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TehilimTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
